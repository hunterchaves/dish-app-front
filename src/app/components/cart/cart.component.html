<h2>Seu Carrinho</h2>
<div class="cart-container">
  <div *ngIf="(cart$ | async) as cart; else emptyCart">
    <div *ngIf="cart.items && cart.items.length > 0; else emptyCart">
      <div *ngFor="let item of cart.items" class="cart-item">
        <span class="item-name">{{ item.dish.name }}</span>
        <span class="item-quantity">Qtd: {{ item.quantity }}</span>
        <span class="item-price">{{ (item.dish.price * item.quantity) | currency:'BRL' }}</span>
      </div>
      <div class="cart-total">
        <strong>Total: {{ cart.total | currency:'BRL' }}</strong>
      </div>
      <button (click)="placeOrder()" class="place-order-btn">Finalizar Pedido</button>
    </div>
  </div>
</div>

<ng-template #emptyCart>
  <div class="empty-cart-message">
    <p>Seu carrinho está vazio.</p>
    <a routerLink="/">Ver cardápio</a>
  </div>
</ng-template>
